<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COMrade</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Device selector (shown when not connected) -->
    <div id="port-select">
      <div class="port-sidebar">
        <div class="port-header">
          <h1>COMrade</h1>
          <p>Select a device to connect</p>
        </div>
        <div class="port-controls">
          <label id="baud-label">
            Baud
            <select id="baud-select">
              <option value="9600">9600</option>
              <option value="19200">19200</option>
              <option value="38400">38400</option>
              <option value="57600">57600</option>
              <option value="115200" selected>115200</option>
              <option value="230400">230400</option>
              <option value="460800">460800</option>
              <option value="921600">921600</option>
              <option value="1000000">1000000</option>
              <option value="2000000">2000000</option>
              <option value="custom">Custom...</option>
            </select>
            <input type="number" id="baud-custom" class="hidden" placeholder="Baud rate" min="1" />
          </label>
          <button id="refresh-btn">Refresh</button>
        </div>
        <div class="port-sidebar-spacer"></div>
        <div class="mcp-badge">
          <span class="mcp-dot"></span>
          <span class="mcp-label">MCP server running</span>
          <span class="mcp-icon" title="MCP server info">&#x2139;
            <div class="mcp-bubble">
              <div class="mcp-bubble-title">MCP server on port 9712</div>
              <div class="mcp-bubble-hint">Add to Claude Code (one-time):</div>
              <code id="mcp-cmd">claude mcp add --transport http comrade http://127.0.0.1:9712/mcp</code>
              <button id="mcp-copy-btn" title="Copy command">Copy</button>
              <div class="mcp-bubble-hint">Start COMrade before Claude Code, or restart Claude Code to connect.</div>
            </div>
          </span>
        </div>
      </div>
      <div id="port-list"></div>
    </div>

    <!-- Terminal (shown when connected) -->
    <div id="terminal" class="hidden">
      <div id="toolbar">
        <div id="toolbar-status"></div>
        <div id="toolbar-actions">
          <button id="descriptor-btn" class="hidden" title="Show HID descriptor">Descriptor</button>
          <button id="search-btn" title="Search (⌘F)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="10" cy="10" r="7"/><line x1="15" y1="15" x2="21" y2="21"/></svg></button>
          <span id="serial-controls" class="hidden">
            <button id="dtr-btn" class="toggle-btn active" title="Toggle DTR">DTR</button>
            <button id="rts-btn" class="toggle-btn" title="Toggle RTS">RTS</button>
            <button id="break-btn" title="Send break signal">BRK</button>
          </span>
          <button id="chart-btn" class="toggle-btn" title="Toggle chart view"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></button>
          <button id="autolog-btn" title="Toggle auto-logging to file"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></button>
          <button id="copy-btn" title="Copy log (⌘⇧C)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
          <button id="pause-btn" class="toggle-btn" title="Pause (Space)"><svg class="pause-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg><svg class="play-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="7,4 20,12 7,20"/></svg><span class="held-count"></span></button>
          <button id="clear-btn" title="Clear log (⌘K)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"/></svg></button>
          <button id="disconnect-btn" title="Disconnect (⌘W)">Disconnect</button>
        </div>
      </div>
      <div id="tab-bar" class="hidden">
        <button id="new-tab-btn" title="New connection">+</button>
      </div>
      <div id="search-bar" class="hidden">
        <input type="text" id="search-input" placeholder="Search logs..." autocomplete="off" spellcheck="false" />
        <span id="search-count"></span>
        <button id="search-prev" title="Previous (Shift+Enter)">&#x25B2;</button>
        <button id="search-next" title="Next (Enter)">&#x25BC;</button>
        <button id="search-close" title="Close (Escape)">&times;</button>
      </div>
      <div id="terminal-body">
        <div id="descriptor-panel" class="hidden">
          <div class="panel-header">
            <span>HID Descriptor</span>
            <button id="descriptor-close-btn" title="Close">&times;</button>
          </div>
          <div class="panel-tabs">
            <button class="panel-tab active" data-tab="parsed">Parsed</button>
            <button class="panel-tab" data-tab="raw">Raw</button>
          </div>
          <div class="panel-content" id="descriptor-parsed"></div>
          <div class="panel-content hidden" id="descriptor-raw"></div>
        </div>
      </div>
      <div id="input-bar">
        <span class="prompt">&gt;</span>
        <div id="hid-input-controls" class="hidden">
          <select id="hid-report-type">
            <option value="output">Output</option>
            <option value="feature">Feature</option>
          </select>
          <input
            type="text"
            id="hid-report-id"
            placeholder="ID"
            size="3"
            maxlength="4"
          />
        </div>
        <input
          type="text"
          id="input"
          placeholder="Type command, Enter to send"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
