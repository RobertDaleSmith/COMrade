name: Release

on:
  push:
    branches: [main]
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
      tag_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: read
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.read.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.read.outputs.version }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app

      - name: Sync version into manifests
        run: bash ../scripts/sync-version.sh

      - name: Build frontend
        working-directory: app/crates/comrade-app/ui
        run: npm ci && npm run build

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  build:
    needs: [check-version, test]
    if: needs.check-version.outputs.tag_exists == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app
          key: release-${{ matrix.arch }}

      - name: Sync version into manifests
        run: bash scripts/sync-version.sh

      - name: Build signed app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment when Apple Developer signing is set up:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: app/crates/comrade-app
          args: --target ${{ matrix.target }}
          tagName: ${{ needs.check-version.outputs.tag }}
          releaseName: COMrade ${{ needs.check-version.outputs.tag }}
          releaseBody: |
            ## COMrade ${{ needs.check-version.outputs.tag }}

            ### Installation
            1. Download the `.dmg` for your Mac architecture below
            2. Open the `.dmg` and drag COMrade to Applications
            3. On first launch, right-click → Open to bypass Gatekeeper (until signing is set up)

            **Apple Silicon (M1/M2/M3/M4):** `COMrade_${{ needs.check-version.outputs.version }}_aarch64.dmg`
            **Intel:** `COMrade_${{ needs.check-version.outputs.version }}_x64.dmg`
          releaseDraft: true
          prerelease: false
